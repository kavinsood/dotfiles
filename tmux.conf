# Sane defaults for mobile/Claude Code usage

# Big scrollback buffer (default is 2000)
set -g history-limit 50000

# Mouse support - scroll, click to select pane, resize
set -g mouse on

# Start window numbering at 1 (easier on phone keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape delay (feels snappier)
set -s escape-time 0

# Keep prefix as Ctrl+b (doesn't conflict with Claude Code)
# But add a second prefix Ctrl+a for convenience
set -g prefix2 C-a
bind C-a send-prefix -2

# Easier splits (prefix + | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Don't rename windows automatically
set -g allow-rename off

# Better colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar - minimal
set -g status-style bg=default,fg=white
set -g status-left "[#S] "
set -g status-right ""
set -g status-left-length 20
